<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pink Glow -->
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Yellow Glow -->
    <filter id="glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Cyan Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Blue Glow -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <path id="star-pink" d="M50 0L61.2 34.5H97.5L68.2 55.8L79.3 90.3L50 69L20.7 90.3L31.8 55.8L2.5 34.5H38.8L50 0Z" fill="#fb4ea4" filter="url(#glow-pink)"/>
    <path id="star-yellow" d="M50 0L61.2 34.5H97.5L68.2 55.8L79.3 90.3L50 69L20.7 90.3L31.8 55.8L2.5 34.5H38.8L50 0Z" fill="#ffd600" filter="url(#glow-yellow)"/>
    <path id="tri-cyan" d="M50 10L90 80H10L50 10Z" fill="none" stroke="#00e5ff" stroke-width="6" filter="url(#glow-cyan)"/>
    <rect id="rect-blue" width="8" height="8" fill="rgba(3,53,146,0.8)" filter="url(#glow-blue)"/>
    <rect id="rect-pink" width="8" height="8" fill="#fb4ea4" filter="url(#glow-pink)"/>
    <rect id="rect-cyan" width="8" height="8" fill="#00e5ff" filter="url(#glow-cyan)"/>
    <rect id="rect-yellow" width="8" height="8" fill="#ffd600" filter="url(#glow-yellow)"/>
  </defs>

