<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game-Zone LBD 1</title>
  
  <link rel="icon" type="image/x-icon" href="assets/images/favicon/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="assets/images/favicon/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon/apple-touch-icon.png">
  <link rel="manifest" href="assets/images/favicon/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/dropzone.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/tray.css">
  <link rel="stylesheet" href="css/screen0.css">
  <link rel="stylesheet" href="css/level-intro.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Mobile portrait hint — shown only via CSS media query, dismissible. -->
  <div id="rotate-prompt" class="rotate-prompt" aria-hidden="true">
    <div class="rotate-prompt__card" role="dialog">
      <div class="rotate-prompt__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
          <path d="M7.5 21.5c-.83 0-1.5-.67-1.5-1.5V4c0-.83.67-1.5 1.5-1.5h9c.83 0 1.5.67 1.5 1.5v6h2V4c0-1.93-1.57-3.5-3.5-3.5h-9C5.57.5 4 2.07 4 4v16c0 1.93 1.57 3.5 3.5 3.5h6v-2h-6zM10 19h4v1h-4z" opacity="0.95"/>
          <path d="M19 14l-4 4 4 4v-3h4v-2h-4v-3z"/>
        </svg>
      </div>
      <h3 class="rotate-prompt__title">Rotate for the best experience</h3>
      <p class="rotate-prompt__sub">Coin Quest is built for landscape. Turn your device sideways to see the full arcade.</p>
      <button class="rotate-prompt__dismiss" type="button">Continue anyway</button>
    </div>
  </div>

  <button id="mute-btn" class="mute-btn" type="button" aria-label="Toggle sound" aria-pressed="false" title="Mute / Unmute">
    <svg class="mute-icon-on" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <svg class="mute-icon-off" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </button>

  <div id="app" class="app-wrapper">
    <div class="cabinet-wrapper">
      
      <!-- Screen 0 (Pre-LBD Screen) -->
      <div id="screen-0" class="screen-0-container">
        <img src="assets/images/Screen0_BG.png" alt="Start Screen Background" class="screen-0-bg" />
        <img src="assets/images/Decorative_element.svg" alt="" class="screen-0-decorations" />
        
        <div class="screen-0-title">
          <div class="title-coin">COIN</div>
          <div class="title-quest">QUEST</div>
        </div>

        <button id="play-btn" class="play-btn">
          <img src="assets/images/Play_BTN.svg" alt="Let's Play" draggable="false" />
        </button>
      </div>

      <div class="game-container">
        <div class="background-container">
          <img src="assets/images/BG.png" alt="Arcade Cabinet Background" class="cabinet-bg" />
        </div>
        
        <div class="ui-layer">
          <!-- Header Area -->
          <header class="game-header">
            <div class="target-box">
              <img src="assets/images/Target_box.svg" alt="Target Box" class="target-bg" />
              <div class="target-content">
                <span class="target-label">TARGET</span>
                <span class="target-amount">₹12</span>
              </div>
            </div>
            
            <div class="question-box">
              <img src="assets/images/Question_template.svg" alt="Question Box" class="question-bg" />
              <div class="question-content">
                <p>Use <span class="highlight">₹2 coins</span> to make <span class="highlight">₹12</span>.</p>
              </div>
            </div>
          </header>

          <!-- Drop Zone -->
          <div class="dropzone-container">
            <img src="assets/images/Drop_zone.svg" alt="Drop Zone Background" class="dropzone-bg" id="dropzone-bg" />
            <div class="dropzone-text" id="dropzone-text">DRAG & DROP MONEY HERE</div>
            <div class="dropzone-area" id="dropzone"></div>
            
            <!-- Check Button (hidden by default) -->
            <button class="action-btn check-btn hidden" id="check-btn">
              <img src="assets/images/Check btn.svg" alt="Check" />
            </button>
          </div>

          <!-- Money Tray -->
          <div class="money-tray">
            <img src="assets/images/Money rack.svg" alt="Money Rack" class="tray-bg" />
            
            <div class="money-area">
              <!-- Coins -->
              <div class="coins-container" id="coins-container">
                <div class="money-item coin" data-value="1">
                  <img src="assets/images/Money/One_Rupee_Default.png" alt="₹1 Coin" draggable="true" />
                </div>
                <div class="money-item coin" data-value="2">
                  <img src="assets/images/Money/Two_Rupee_Default.png" alt="₹2 Coin" draggable="true" />
                </div>
                <div class="money-item coin" data-value="5">
                  <img src="assets/images/Money/Five_Rupee_Default.png" alt="₹5 Coin" draggable="true" />
                </div>
                <div class="money-item coin" data-value="10">
                  <img src="assets/images/Money/Ten_Rupee_Default.png" alt="₹10 Coin" draggable="true" />
                </div>
                <div class="money-item coin" data-value="20">
                  <img src="assets/images/Money/Twenty_Rupee_Default.png" alt="₹20 Coin" draggable="true" />
                </div>
              </div>

              <!-- Notes -->
              <div class="notes-container" id="notes-container">
                <div class="money-item note" data-value="10">
                  <img src="assets/images/Money/Ten_Rupee_Note_Default.png" alt="₹10 Note" draggable="true" />
                </div>
                <div class="money-item note" data-value="20" id="dynamic-note">
                  <img src="assets/images/Money/Twenty_Rupee_Note_Default.png" alt="₹20 Note" draggable="true" />
                </div>
              </div>
            </div>
          </div>
          
          <!-- Hand Nudge -->
          <img src="assets/images/hand_nudge.svg" alt="Drag Hint" class="hand-nudge hidden" id="hand-nudge" />

        </div>

        <!-- Level Transition Overlay -->
        <div id="level-transition-overlay" class="level-transition-overlay hidden">
          <h1 class="level-title" id="transition-title">LEVEL 1</h1>
          <h2 class="level-subtitle" id="transition-subtitle">Make ₹25</h2>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>

  <!-- QA Comment Mode (temporary). Activates only with ?qa=true in the URL.
       Remove these two lines + the /qa/ folder when QA is done. -->
  <script type="module" src="qa/qa-mode.js"></script>
</body>
</html>
